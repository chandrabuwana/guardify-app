name: guardify_app
description: A secure Flutter application with clean architecture and BLoC pattern.
publish_to: 'none'
version: 1.0.12+9

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

  # State Management
  flutter_bloc: ^9.1.1
  provider: ^6.1.2
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^9.1.1
  injectable: ^2.3.2

  # Network
  dio: ^5.4.0
  retrofit: ^4.0.1
  json_annotation: ^4.9.0
  web_socket_channel: ^3.0.1
  signalr_netcore: ^1.0.0

  # Local Storage & Security
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0-beta.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  crypto: ^3.0.3

  # Authentication & Security
  local_auth: ^3.0.0

  # Utils
  dartz: ^0.10.1
  freezed_annotation: ^2.4.4
  logger: ^2.0.2+1
  device_info_plus: ^12.3.0
  package_info_plus: ^8.3.1
  intl: ^0.20.2

  # UI
  cupertino_icons: ^1.0.2
  table_calendar: ^3.2.0
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.1

  # File & Camera
  file_picker: ^10.3.7
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  permission_handler: ^12.0.1
  path_provider: ^2.1.4
  geolocator: ^14.0.2
  url_launcher: ^6.3.1
  pdfx: ^2.2.0
  share_plus: ^10.1.2
  photo_view: ^0.15.0
  gal: ^1.2.9

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Background Tasks
  # workmanager: ^0.5.2  # Temporarily removed due to Kotlin 2.1.0 compatibility issue
  # TODO: Update to workmanager 0.9.0+3 when ready (requires code changes)

  # Windows compatibility fix
  win32: ^5.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  retrofit_generator: ^7.0.0
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  hive_generator: ^2.0.1

  # Linting
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/logoApp.Jpeg"
  remove_alpha_ios: true
